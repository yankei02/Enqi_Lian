<!DOCTYPE html>
<html lang='en'>
<head>
    <title>Contact — Enqi Lian</title>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <meta name='theme-color' content='#e8e4de'/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #e8e4de; --text: #2d2926; --muted: #7a7068; --border: #d0cbc4; }

        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 17px;
            line-height: 1.7;
        }

        .site-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
        }
        .site-nav .name {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: .04em;
            text-decoration: none;
            color: var(--text);
        }
        .site-nav .links {
            display: flex;
            gap: 32px;
        }
        .site-nav .links a {
            font-size: 14px;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: .04em;
            transition: color 0.2s;
        }
        .site-nav .links a:hover { color: var(--text); }

        .page-content {
            max-width: 560px;
            margin: 0 auto;
            padding: 60px 40px 100px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 400;
            margin-bottom: 16px;
            letter-spacing: .01em;
        }

        .contact-intro {
            font-size: 17px;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 48px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 11px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .form-group input,
        .form-group textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            font-family: 'EB Garamond', serif;
            font-size: 17px;
            color: var(--text);
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--border);
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: var(--text);
        }
        .form-group textarea {
            resize: none;
            height: 130px;
            line-height: 1.6;
        }

        .form-submit button {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--text);
            background: none;
            border: none;
            border-bottom: 1px solid var(--text);
            padding-bottom: 2px;
            cursor: pointer;
            letter-spacing: .04em;
            transition: color 0.2s, border-color 0.2s;
        }
        .form-submit button:hover { color: var(--muted); border-color: var(--muted); }

        .form-success {
            display: none;
            font-size: 16px;
            font-style: italic;
            color: var(--muted);
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .site-nav { padding: 20px 24px; }
            .page-content { padding: 40px 24px 80px; }
            .site-nav .links { gap: 20px; }
        }
    </style>
</head>
<body>

    <nav class="site-nav">
        <a class="name" href="index.html">Enqi Lian</a>
        <div class="links">
            <a href="about.html">About</a>
            <a href="works.html">Works</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </div>
    </nav>

    <div class="page-content">
        <div class="page-title">Contact</div>
        <p class="contact-intro">Feel free to reach out for collaborations, commissions, or any enquiries.</p>

        <form class="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="What is this about?">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message..." required></textarea>
            </div>
            <div class="form-submit">
                <button type="submit">Send →</button>
                <p class="form-success" id="form-success">Thank you — I'll be in touch soon.</p>
            </div>
        </form>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const name    = document.getElementById('name').value;
            const email   = document.getElementById('email').value;
            const subject = document.getElementById('subject').value || 'Message from website';
            const message = document.getElementById('message').value;
            const body    = 'From: ' + name + ' <' + email + '>\n\n' + message;
            window.location.href = 'mailto:enqilian619@gmail.com'
                + '?subject=' + encodeURIComponent(subject)
                + '&body='    + encodeURIComponent(body);
            document.getElementById('form-success').style.display = 'block';
            e.target.reset();
        }
    </script>

</body>
</html>
