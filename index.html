<!DOCTYPE html>
<html lang='en'>
<head>
    <title>Enqi Lian</title>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <meta name='theme-color' content='#e8e4de'/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #e8e4de; --text: #2d2926; --muted: #7a7068; }

        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', Georgia, serif;
            height: 100%;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 40px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(52px, 8vw, 96px);
            font-weight: 400;
            letter-spacing: .01em;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero .subtitle {
            font-size: 18px;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 60px;
        }

        .hero-links {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-links a {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 400;
            color: var(--text);
            text-decoration: none;
            padding: 10px 0;
            letter-spacing: .01em;
            transition: color 0.2s;
        }
        .hero-links a:hover { color: var(--muted); }

        @media (max-width: 600px) {
            .hero { padding: 60px 24px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Enqi Lian</h1>
        <p class="subtitle">Composer &amp; Sound Designer</p>
        <div class="hero-links">
            <a href="about.html">About</a>
            <a href="works.html">Works</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </div>
    </div>

    <script type="application/javascript">
    var doNotTrack = false;
    if (!doNotTrack) {
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
        ga('create', 'UA-156421768-1', 'auto');
        ga('send', 'pageview');
    }
    </script>
</body>
</html>
